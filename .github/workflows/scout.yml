name: scout

on:
  schedule:
    - cron: "0 13 * * *"   # daily at 13:00 UTC (09:00 ET / 06:00 PT)
  workflow_dispatch:
    inputs:
      include_archive:
        description: "Include archive lane in digest"
        required: false
        default: "false"

concurrency:
  group: scout-run
  cancel-in-progress: false

permissions:
  contents: write  # needed to commit DB + digest back
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Ingest + classify + digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SAM_GOV_API_KEY: ${{ secrets.SAM_GOV_API_KEY }}
          SCOUT_DB_PATH: data/scout.db
        run: |
          scout -v ingest
          scout -v classify
          scout -v digest ${{ github.event.inputs.include_archive == 'true' && '--include-archive' || '' }}

      - name: Email digest via Buttondown
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          SCOUT_DB_PATH: data/scout.db
        run: scout -v email

      - name: Commit DB and digest
        run: |
          git config user.name "scout-bot"
          git config user.email "scout-bot@users.noreply.github.com"
          git add data/scout.db docs/digest_*.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "scout: digest $(date -u +%Y-%m-%dT%H:%MZ)"
          # Retry with rebase to survive concurrent pushes (manual dev pushes,
          # other scout-bot runs, etc.). Three attempts is plenty.
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            echo "Push attempt $attempt failed; rebasing and retrying"
            git pull --rebase origin main
          done
          echo "Push failed after 3 attempts" >&2
          exit 1

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: scout-digest
          path: docs/digest_*.md
          if-no-files-found: ignore

  pages:
    runs-on: ubuntu-latest
    needs: run
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # pull the DB that `run` just committed

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Generate site
        env:
          SCOUT_DB_PATH: data/scout.db
          SCOUT_BUTTONDOWN_USER: ${{ vars.SCOUT_BUTTONDOWN_USER }}
        run: scout web --out site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
