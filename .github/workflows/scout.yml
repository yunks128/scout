name: scout

on:
  schedule:
    - cron: "0 */4 * * *"   # every 4 hours, UTC
  workflow_dispatch:
    inputs:
      include_archive:
        description: "Include archive lane in digest"
        required: false
        default: "false"

concurrency:
  group: scout-run
  cancel-in-progress: false

permissions:
  contents: write  # needed to commit DB + digest back

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Ingest + classify + digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SAM_GOV_API_KEY: ${{ secrets.SAM_GOV_API_KEY }}
          SCOUT_DB_PATH: data/scout.db
        run: |
          scout -v ingest
          scout -v classify
          scout -v digest ${{ github.event.inputs.include_archive == 'true' && '--include-archive' || '' }}

      - name: Commit DB and digest
        run: |
          git config user.name "scout-bot"
          git config user.email "scout-bot@users.noreply.github.com"
          git add data/scout.db docs/digest_*.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "scout: digest $(date -u +%Y-%m-%dT%H:%MZ)"
          # Retry with rebase to survive concurrent pushes (manual dev pushes,
          # other scout-bot runs, etc.). Three attempts is plenty.
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            echo "Push attempt $attempt failed; rebasing and retrying"
            git pull --rebase origin main
          done
          echo "Push failed after 3 attempts" >&2
          exit 1

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: scout-digest
          path: docs/digest_*.md
          if-no-files-found: ignore
