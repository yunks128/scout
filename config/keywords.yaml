# Lexical gate vocabulary for JPL Section 345 scope: spacecraft power,
# electronics, avionics, photovoltaics, thermoelectric/electrochemical systems.
# A notice's lexical score must hit >= 3 to pass the gate and reach the LLM.
# Re-mine quarterly from recent NSPIRES/STMD awards and DoD space-tech awards.

core_space_power:
  - { term: "solar array", weight: 4 }
  - { term: "space photovoltaic", weight: 5 }
  - { term: "photovoltaic", weight: 3 }
  - { term: "multijunction solar", weight: 4 }
  - { term: "RTG", weight: 5 }
  - { term: "radioisotope thermoelectric", weight: 5 }
  - { term: "thermoelectric generator", weight: 4 }
  - { term: "thermoelectric", weight: 3 }
  - { term: "spacecraft power", weight: 5 }
  - { term: "space power", weight: 4 }
  - { term: "lunar surface power", weight: 5 }
  - { term: "fission surface power", weight: 5 }
  - { term: "solar cell", weight: 3 }
  - { term: "perovskite", weight: 3 }
  - { term: "high voltage", weight: 2 }
  - { term: "direct energy conversion", weight: 4 }
  - { term: "Peltier cooling", weight: 3 }   # thermoelectric Peltier effect

