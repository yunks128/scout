# Terrestrial-grid terms kept at low weight — marginally relevant, won't clear
# the gate on their own but won't actively exclude either.
adjacent_terrestrial:
  - { term: "grid resilience", weight: 1 }
  - { term: "grid modernization", weight: 1 }
  - { term: "microgrid", weight: 1 }
  - { term: "inverter", weight: 1 }

exclusions:
  # Hard-exclude when present and no core term fires.
  - "healthcare"
  - "pharmaceutical"
  - "agriculture"
  - "biomedical"
  - "dissertation"
  - "undergraduate research experience"
